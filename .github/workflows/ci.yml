# .github/workflows/ci.yml
# ============================================================
# Pipeline de CI — Testes Automatizados com Playwright
# Projeto: ci_testes_inteligentes
# Dispara: Push em branches de feature/test e PRs para main
# ============================================================

name: 🧪 CI — Playwright Tests (Manual + IA)

on:
  # Dispara em push para branches que NÃO sejam main/master
  push:
    branches-ignore:
      - main
      - master

  # Dispara em Pull Requests direcionados à main/master
  pull_request:
    branches:
      - main
      - master

  # Permite disparo manual pelo GitHub UI
  workflow_dispatch:

# Garante que apenas um workflow rode por branch/PR por vez
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Testes Manuais ─────────────────────────────────────────────────
  testes-manuais:
    name: 🔵 Testes Manuais (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                          # Cache das dependências npm

      - name: 📦 Instalar dependências
        run: npm ci                             # Install limpo e reproduzível

      - name: 🎭 Instalar browsers do Playwright
        run: npx playwright install --with-deps chromium firefox

      - name: 🧪 Executar testes MANUAIS
        id: manual-tests
        run: |
          echo "=================================================="
          echo "🔵 Iniciando execução dos TESTES MANUAIS"
          echo "=================================================="
          npx playwright test tests/manual/ \
            --reporter=list,html \
            --output=test-results/manual
        env:
          CI: true

      - name: 📊 Resultado dos testes manuais
        if: always()
        run: |
          if [ "${{ steps.manual-tests.outcome }}" = "success" ]; then
            echo "=================================================="
            echo "✅ PASSED — Todos os testes manuais passaram!"
            echo "=================================================="
          else
            echo "=================================================="
            echo "❌ FAILED — Um ou mais testes manuais falharam!"
            echo "=================================================="
            exit 1
          fi

      - name: 📁 Publicar artefatos — Testes Manuais
        if: always()                           # Publica mesmo em caso de falha
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-manuais
          path: |
            playwright-report/
            test-results/
          retention-days: 7                    # Retenção de 7 dias conforme requisito


  # ── Job 2: Testes com IA ──────────────────────────────────────────────────
  testes-ia:
    name: 🤖 Testes com IA/Copilot (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: testes-manuais                      # Só roda se os manuais passarem

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🎭 Instalar browsers do Playwright
        run: npx playwright install --with-deps chromium firefox

      - name: 🤖 Executar testes COM IA
        id: ai-tests
        run: |
          echo "=================================================="
          echo "🤖 Iniciando execução dos TESTES COM IA (Copilot)"
          echo "=================================================="
          npx playwright test tests/ai/ \
            --reporter=list,html \
            --output=test-results/ai
        env:
          CI: true

      - name: 📊 Resultado dos testes com IA
        if: always()
        run: |
          if [ "${{ steps.ai-tests.outcome }}" = "success" ]; then
            echo "=================================================="
            echo "✅ PASSED — Todos os testes com IA passaram!"
            echo "=================================================="
          else
            echo "=================================================="
            echo "❌ FAILED — Um ou mais testes com IA falharam!"
            echo "=================================================="
            exit 1
          fi

      - name: 📁 Publicar artefatos — Testes com IA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes-ia
          path: |
            playwright-report/
            test-results/
          retention-days: 7


  # ── Job 3: Resumo final da pipeline ──────────────────────────────────────
  resumo-pipeline:
    name: 📋 Resumo da Pipeline
    runs-on: ubuntu-latest
    needs: [testes-manuais, testes-ia]
    if: always()

    steps:
      - name: 📋 Exibir status consolidado
        run: |
          echo "=================================================="
          echo "📋 RESUMO DA PIPELINE CI"
          echo "=================================================="
          echo "Branch:         ${{ github.ref_name }}"
          echo "Commit:         ${{ github.sha }}"
          echo "Autor:          ${{ github.actor }}"
          echo "--------------------------------------------------"
          echo "Testes Manuais: ${{ needs.testes-manuais.result }}"
          echo "Testes com IA:  ${{ needs.testes-ia.result }}"
          echo "=================================================="

          if [ "${{ needs.testes-manuais.result }}" = "success" ] && \
             [ "${{ needs.testes-ia.result }}" = "success" ]; then
            echo "🎉 PIPELINE: PASSED — Todos os testes aprovados!"
          else
            echo "💥 PIPELINE: FAILED — Verifique os logs acima."
            exit 1
          fi
